<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FERREMAS - Inicio</title>
    <link href="{{ url_for('static', filename='estilo.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
        /* Add background to carousel text */
        .carousel-caption {
          background-color: rgba(0, 0, 0, 0.508);
          /* Dark background with 50% opacity */
          padding: 20px;
          /* Add some padding for better readability */
        }
    
        /* Edit carousel text */
        .carousel-caption p,
        .carousel-caption h1,
        .carousel-caption a {
          color: white;
          /* Set text color to white */
        }
    
        /* Customize carousel control buttons */
        .carousel-control-prev,
        .carousel-control-next {
          width: 5%;
          /* Adjust width */
          color: black;
          /* Change color */
          background-color: rgba(129, 126, 126, 0.886);
          /* Semi-transparent white background */
     
        }
    
        /* Adjust icon size */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
          height: 50px;
          /* Set height */
          width: 50px;
          /* Set width */
        }
    
        /* Center the buttons vertically */
        .carousel-control-prev,
        .carousel-control-next {
          top: 50%;
          /* Move to the middle */
          transform: translateY(-50%);
          /* Adjust vertically */
        }
      </style>
</head>
<body>
    <!-- NAVBAR REUTILIZADO -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='Imagenes Página/Pata.png') }}" alt="Logo" width="300">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
            aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <!-- Puedes agregar más enlaces aquí -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('tienda') }}">Tienda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('ver_carrito') }}">Carrito</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('contact') }}">Contacto</a>
                    </li>
                </ul>
                {% if usuario_logueado %}
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm" href="{{ url_for('mi_perfil') }}">Mi Perfil</a>
                    </li>
                    <li class="nav-item ms-2">
                        <form method="POST" action="{{ url_for('logout') }}">
                            <button class="btn btn-light btn-sm" type="submit">Cerrar sesion</button>
                        </form>
                    </li>
                </ul>
                {% endif %}
            </div>
        </div>
    </nav>

<h2>Pago Confirmado</h2>
<p>Orden: {{ detalle.buy_order }}</p>
<p>Monto: ${{ detalle.amount }}</p>
<p>Estado: {{ detalle.status }}</p>
<p>Código de autorización: {{ detalle.authorization_code }}</p>

</body>
</html>
