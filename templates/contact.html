<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - FERREMAS</title>
    <!-- Estilos y librerías externas -->
    <link href="{{ url_for('static', filename='estilo.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Toastify JS -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <style>
        /* Puedes mantener estos estilos locales también */
        

        form {
            background: white;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 1rem;
        }

        button {
            background-color: #2d89ef;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b65c7;
        }

        .message {
            color: green;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- NAVBAR REUTILIZADO -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='Imagenes Página/Pata.png') }}" alt="Logo" width="300">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
            aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <!-- Puedes agregar más enlaces aquí -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('tienda') }}">Tienda</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('ver_carrito') }}">Carrito</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('contact') }}">Contacto</a>
                    </li>
                </ul>
                {% if usuario_logueado %}
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm" href="{{ url_for('mi_perfil') }}">Mi Perfil</a>
                    </li>
                    <li class="nav-item ms-2">
                        <form method="POST" action="{{ url_for('logout') }}">
                            <button class="btn btn-light btn-sm" type="submit">Cerrar sesion</button>
                        </form>
                    </li>
                </ul>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <h2 style="text-align:center; margin-top: 30px;">Formulario de Contacto FERREMAS</h2>

    {% if mensaje %}
<script>
    Toastify({
        text: "{{ mensaje }}",
        duration: 4000,
        close: true,
        gravity: "top", 
        position: "right",
        stopOnFocus: true,
        style: {
            background: "linear-gradient(to right,rgb(51, 168, 76),rgb(116, 233, 92))",
            textTransform: "uppercase",
            fontSize: ".75rem"
        },
        offset: {
            x: '1.5rem', 
            y: '1.5rem'
        },
        onClick: function(){} 
       
        
    }).showToast();
    
    // O usar SweetAlert2 si prefieres algo más llamativo:
    // Swal.fire({
    //     icon: 'success',
    //     title: 'Mensaje enviado',
    //     text: '{{ mensaje }}'
    // });
</script>
{% endif %}


    <form method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" name="nombre" required>

        <label for="email">Correo electrónico:</label>
        <input type="email" name="email" required>

        <label for="mensaje">Mensaje:</label>
        <textarea name="mensaje" rows="5" required></textarea>

        <button type="submit">Enviar</button>
    </form>


</body>
</html>
